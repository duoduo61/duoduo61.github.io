<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoDuo's Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* 背景遮罩，增强毛玻璃效果 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            position: relative;
        }

        /* 左侧区域 */
        .left-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
        }

        .title {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .quote-card p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .quote-card .quote-mark {
            font-size: 1.5rem;
            opacity: 0.7;
        }

        /* 右侧区域 */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-right {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .quote-card-right p {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .quote-card-right .author {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .time-card .date {
            font-size: 1rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .time-card .time {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        .time-card .motto {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 导航区域 */
        .nav-title {
            text-align: center;
            margin: 10px 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(100, 180, 255, 0.5);
        }

        .nav-btn i {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #63b3ed;
        }

        .nav-btn span {
            font-size: 1rem;
        }

        /* 社交图标 */
        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .social-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .social-icon i {
            font-size: 1.2rem;
            color: #fff;
        }

        /* 底部版权 */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }

        /* 响应式适配 */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .top-right {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .title {
                font-size: 2rem;
            }

            .time-card .time {
                font-size: 2rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 左侧区域 -->
        <div class="left-section">
            <div class="header">
                <img src="https://picsum.photos/200/200" alt="头像" class="avatar">
                <div class="title">Duoduo's Home</div>
            </div>

            <div class="quote-card">
                <span class="quote-mark">“</span>
                <p>欢迎~</p>
                <p>来自一个无名作者的资源分享导航页</p>
                <span class="quote-mark" style="float: right;">”</span>
            </div>

            <div class="social-icons">
                <div class="social-icon"><i class="fa-brands fa-github"></i></div>
                <div class="social-icon"><i class="fa-brands fa-bilibili"></i></div>
                <div class="social-icon"><i class="fa-brands fa-qq"></i></div>
                <div class="social-icon"><i class="fa-solid fa-envelope"></i></div>
                <div class="social-icon"><i class="fa-brands fa-twitter"></i></div>
                <div class="social-icon"><i class="fa-brands fa-telegram"></i></div>
            </div>
        </div>

        <!-- 右侧区域 -->
        <div class="right-section">
            <div class="top-right">
                <div class="card quote-card-right">
                    <p>好男儿胸怀像大海</p>
                    <p class="author">-「 曾经的你 」</p>
                </div>

                <div class="card time-card">
                    <div class="date" id="date"></div>
                    <div class="time" id="time"></div>
                    <div class="motto">奔赴山海 保持热爱</div>
                </div>
            </div>

            <div class="nav-title">
                <i class="fa-solid fa-link"></i> 网站列表
            </div>

            <div class="nav-grid">
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-solid fa-blog"></i>
                    <span>博客</span>
                </div>
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-solid fa-cloud"></i>
                    <span>网盘</span>
                </div>
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-brands fa-bilibili"></i>
                    <span>b站</span>
                </div>
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-solid fa-person-running"></i>
                    <span>冲刺</span>
                </div>
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-solid fa-compass"></i>
                    <span>搜索</span>
                </div>
                <div class="nav-btn" onclick="openLink('https://example.com')">
                    <i class="fa-solid fa-fire"></i>
                    <span>今日热榜</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Copyright © 2025 - 2026 @多多 萌ICP备20260227号
    </footer>

    <script>
        // 时间更新函数
        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('date').textContent = `${year} 年 ${month} 月 ${day} 日 ${week}`;
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // 初始化时间并每秒更新
        updateTime();
        setInterval(updateTime, 1000);

        // 跳转链接函数
        function openLink(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
<p>
<a href="https://icp.gov.moe/?keyword=20260227" target="_blank">萌ICP备20260227号</a>
