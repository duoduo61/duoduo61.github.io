<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }
        /* 主体内容区 - 仅显示"示例文本" */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #333;
        }
        footer {
            text-align: center;
            padding: 15px 0;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
        footer a {
            color: #999;
            text-decoration: none;
        }
        footer a:hover {
            color: #666;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>示例文本</main>
    <footer>
        <a href="https://icp.gov.moe/?keyword=20260227" target="_blank" rel="noopener noreferrer">萌ICP备20260227号</a>
    </footer>
</body>
</html>
