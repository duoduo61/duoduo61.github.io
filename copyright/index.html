<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免责声明 - DuoDuo's Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* 背景遮罩 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 760px;
        }

        /* 免责声明卡片 */
        .disclaimer-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 35px 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .disclaimer-card h2 {
            font-size: 1.5rem;
            text-align: center;
            padding-bottom: 18px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .disclaimer-card ol {
            padding-left: 24px;
            line-height: 1.8;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .disclaimer-card li {
            margin-bottom: 16px;
        }

        .disclaimer-card li:last-child {
            margin-bottom: 0;
        }

        /* 最后更新时间样式 */
        .update-time {
            margin-top: 25px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.75;
        }

        /* 返回首页按钮 */
        .back-btn {
            margin-top: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            padding: 12px 32px;
            background: rgba(99, 179, 237, 0.2);
            border: 1px solid rgba(99, 179, 237, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(99, 179, 237, 0.3);
            border-color: rgba(99, 179, 237, 0.5);
            transform: translateY(-2px);
        }

        /* 底部版权 */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }

        footer a {
            color: inherit;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* 响应式适配 */
        @media (max-width: 600px) {
            .disclaimer-card {
                padding: 25px 20px;
            }
            
            .disclaimer-card h2 {
                font-size: 1.2rem;
            }

            .disclaimer-card ol {
                font-size: 0.95rem;
                padding-left: 20px;
            }

            .update-time {
                text-align: center;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

                <li>不得将上述内容用于商业或者非法用途，否则，一切后果请用户自负。</li>
                <li>本站信息来自网络，版权争议与本站无关，您必须在下载后的24个小时之内，从您的电脑中彻底删除上述内容。访问和下载本站内容，说明您已同意上述条款。</li>
                <li>本站为非盈利性站点，不接受任何捐赠、打赏，本站不贩卖软件，所有内容不作为商业行为。</li>
            </ol>
            <div class="update-time">最后更新时间：2026年06月13日</div>
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fa-solid fa-house"></i> 返回首页
            </button>
        </div>
    </div>

    <footer>
        Copyright © 2025 - 2026 @多多 
        <a href="https://icp.gov.moe/?keyword=20260227" target="_blank">萌ICP备20260227号</a>
    </footer>
</body>
  </html>
